name: Deploy to Hugging Face Spaces

on:
  push:
    branches: ["main"]
    paths:
      - "data_explorer/**"
  workflow_dispatch:

env:
  APP_DIR: data_explorer

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        env:
          DEPLOY_TARGET: huggingface
        run: npm run build

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub[hf_xet] --quiet

          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="dist",
              repo_id="matthewhaynesonline/axiom-explorer",
              repo_type="space",
              commit_message=f"Deploy from GitHub Actions - {os.environ.get('GITHUB_SHA', 'unknown')[:7]}",
          )
          EOF
